<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" ng-app="litixOnboard">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create your account | Litix</title>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      --bg: #0b0f17;
      --panel: #0f1420;
      --border: rgba(255, 255, 255, 0.06);
      --text-primary: #f5f6fa;
      --text-secondary: rgba(245, 246, 250, 0.7);
      --accent: #0a84ff;
      --input: #111828;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
      --glow: rgba(10, 132, 255, 0.14);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 56px 16px;
      background: radial-gradient(circle at 16% 18%, rgba(10, 132, 255, 0.12), transparent 40%),
      radial-gradient(circle at 82% 4%, rgba(90, 115, 255, 0.08), transparent 45%),
      linear-gradient(160deg, #080c13, var(--bg));
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    main {
      position: relative;
      width: min(560px, 96vw);
      padding: 56px 52px 48px;
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(17, 23, 34, 0.92), rgba(12, 16, 26, 0.96));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(2px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      margin-bottom: 14px;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      font-size: 0.95rem;
      text-transform: uppercase;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(10, 132, 255, 0.18);
    }

    .eyebrow {
      color: var(--text-secondary);
      letter-spacing: 0.2em;
      font-size: 0.82rem;
      text-transform: uppercase;
    }

    h1 {
      font-size: 2.3rem;
      margin: 10px 0 10px;
      letter-spacing: -0.02em;
    }

    p.subtitle {
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.6;
      max-width: 44ch;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.92rem;
      color: var(--text-secondary);
      letter-spacing: 0.03em;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--input);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 1rem;
      color: var(--text-primary);
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    input:focus {
      outline: none;
      border-color: rgba(10, 132, 255, 0.7);
      box-shadow: 0 0 0 6px rgba(10, 132, 255, 0.14);
      transform: translateY(-1px);
    }

    .input-grid {
      display: grid;
      gap: 18px;
    }

    .input-group.invalid input {
      border-color: #ff5b5b;
      box-shadow: 0 0 0 6px rgba(255, 91, 91, 0.18);
    }

    button[type="submit"] {
      margin-top: 26px;
      width: 100%;
      padding: 16px 22px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, #0f8bff, #0a6fdd);
      color: var(--text-primary);
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 20px 38px rgba(10, 132, 255, 0.28);
    }

    button[type="submit"]:hover {
      transform: translateY(-1px);
      box-shadow: 0 24px 48px rgba(10, 132, 255, 0.32);
    }

    button[type="submit"]:active {
      transform: translateY(1px);
    }

    .terms {
      margin-top: 20px;
      font-size: 0.9rem;
      text-align: center;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .terms a {
      color: var(--text-primary);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      transition: color 0.18s ease, border-color 0.18s ease;
    }

    .terms a:hover {
      color: var(--accent);
      border-color: rgba(10, 132, 255, 0.4);
    }

    .switch-auth {
      margin-top: 30px;
      font-size: 0.96rem;
      text-align: center;
      color: var(--text-secondary);
    }

    .switch-auth a {
      color: var(--text-primary);
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      transition: color 0.18s ease, border-color 0.18s ease;
    }

    .switch-auth a:hover {
      color: var(--accent);
      border-color: rgba(10, 132, 255, 0.4);
    }

    .playbook {
      position: absolute;
      inset: 32px;
      pointer-events: none;
      opacity: 0.35;
      background:
              radial-gradient(circle at 18% 32%, var(--glow), transparent 28%),
              radial-gradient(circle at 76% 64%, rgba(10, 132, 255, 0.1), transparent 32%),
              repeating-linear-gradient(0deg, transparent 0, transparent 60px, var(--field, rgba(255,255,255,0.03)) 60px, var(--field, rgba(255,255,255,0.03)) 62px),
              repeating-linear-gradient(90deg, transparent 0, transparent 60px, var(--field, rgba(255,255,255,0.03)) 60px, var(--field, rgba(255,255,255,0.03)) 62px);
    }

    .route {
      position: absolute;
      width: 2px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.35));
      border-radius: 999px;
      transform-origin: top;
      filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.35));
    }

    .route::after {
      content: "";
      position: absolute;
      left: -10px;
      top: -6px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.05);
    }

    .route.os::after {
      border-radius: 6px;
      content: "O";
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.35);
      font-weight: 600;
      letter-spacing: 0.08em;
      background: rgba(255, 255, 255, 0.07);
    }

    .route.xs::after {
      content: "X";
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.35);
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .tag {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
    }

    .status-row {
      margin-top: 16px;
      color: var(--text-secondary);
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(10, 132, 255, 0.18);
    }

    @media (max-width: 560px) {
      main {
        padding: 40px 22px 34px;
        border-radius: 22px;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body ng-controller="OnboardController as vm">
<div class="playbook" aria-hidden="true">
  <div class="route" ng-repeat="route in vm.routes" ng-class="route.variant" ng-style="vm.routeStyle(route)"></div>
</div>
<main role="main">
  <div class="brand">
    <span class="brand-dot" aria-hidden="true"></span>
    <span>Litix</span>
  </div>
  <div class="tags">
    <span class="tag" ng-repeat="tag in vm.tags">{{tag}}</span>
  </div>
  <p class="eyebrow">Create account</p>
  <h1>Join Litix</h1>
  <p class="subtitle">Set up your Litix account to get a clean, focused space for your work.</p>
  <form name="registerForm" th:action="@{/register}" th:object="${registrationForm}" method="post" autocomplete="on" ng-submit="vm.handleSubmit($event)" novalidate>
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <div class="input-grid">
      <div class="input-group" ng-class="{'invalid': vm.submitted && registerForm.displayName.$invalid}">
        <label th:for="*{displayName}">Full name</label>
        <input type="text" th:field="*{displayName}" autocomplete="name" placeholder="How should we call you?" ng-model="vm.form.displayName" required>
      </div>
      <div class="input-group" ng-class="{'invalid': vm.submitted && registerForm.email.$invalid}">
        <label th:for="*{email}">Email address</label>
        <input type="email" th:field="*{email}" autocomplete="email" placeholder="you@litix.com" ng-model="vm.form.email" required>
      </div>
      <div class="input-group" ng-class="{'invalid': vm.submitted && registerForm.username.$invalid}">
        <label th:for="*{username}">Username</label>
        <input type="text" th:field="*{username}" autocomplete="username" placeholder="Choose a unique handle" ng-model="vm.form.username" required>
      </div>
      <div class="input-group" ng-class="{'invalid': vm.submitted && registerForm.password.$invalid}">
        <label th:for="*{password}">Password</label>
        <input type="password" th:field="*{password}" autocomplete="new-password" placeholder="Create a strong password" ng-model="vm.form.password" required>
      </div>
    </div>
    <button type="submit">Create account</button>
    <div class="status-row" ng-if="vm.status">
      <span class="status-dot" aria-hidden="true"></span>
      <span>{{vm.status}}</span>
    </div>
  </form>
  <p class="terms">By creating an account you agree to our <a href="#">Terms of Service</a> and acknowledge our <a href="#">Privacy Policy</a>.</p>
  <p class="switch-auth">Already have an account? <a th:href="@{/login}">Sign in</a></p>
</main>
<script>
  angular.module('litixOnboard', [])
    .controller('OnboardController', function() {
      const vm = this;
      vm.form = {};
      vm.tags = ['Sports tech', 'Signal sync', 'Edge-ready'];
      vm.routes = [
        { height: 200, left: '16%', top: '18%', rotate: 18, variant: 'os' },
        { height: 170, left: '34%', top: '54%', rotate: -14, variant: 'xs' },
        { height: 210, left: '58%', top: '20%', rotate: 8, variant: 'os' },
        { height: 150, left: '78%', top: '50%', rotate: -18, variant: 'xs' },
      ];

      vm.routeStyle = function(route) {
        return {
          height: route.height + 'px',
          left: route.left,
          top: route.top,
          transform: 'rotate(' + route.rotate + 'deg)'
        };
      };

      vm.handleSubmit = function(event) {
        vm.submitted = true;

        if (event.target.checkValidity && !event.target.checkValidity()) {
          event.preventDefault();
          vm.status = 'Double-check the required fields before joining.';
          return;
        }

        vm.status = 'Creating your Litix profile...';
      };
    });
</script>
</body>
</html>
